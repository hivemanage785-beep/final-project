services:
  # 1. HiveOps ML Service (Python FastAPI)
  # Provides flora density analysis and predictive yield scoring.
  - type: web
    name: hiveops-ml-service
    env: python
    plan: free
    region: oregon
    buildCommand: "cd ml-service && pip install -r requirements.txt"
    startCommand: "cd ml-service && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: NODE_ENV
        value: production

  # 2. HiveOps Backend Service (Node.js Express)
  # Core operational API for hive management and traceability.
  - type: web
    name: hiveops-backend-service
    env: node
    plan: free
    region: oregon
    buildCommand: "cd backend && npm install"
    startCommand: "cd backend && npm start"
    healthCheckPath: /api/tiles/status
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false # REQUIRED: Set your MongoDB Atlas URI in Render Dashboard
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false # REQUIRED: Set your Firebase Service Account JSON in Render Dashboard
      - key: ML_SERVICE_URL
        fromService:
          name: hiveops-ml-service
          type: web
          property: host
      - key: FRONTEND_URL
        value: https://hive-ops.vercel.app # Update this to your production frontend URL
      - key: JWT_SECRET
        generateValue: true
